services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: aegisai-api
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/v1/health').getcode()==200 else sys.exit(1)\""]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: aegisai-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
