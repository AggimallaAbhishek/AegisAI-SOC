services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ..:/app
    env_file:
      - ../.env
    command: >
      sh -c "pip install --no-cache-dir -r backend/requirements.txt &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
